<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>A Simply Skeleton App</title>
	<link rel="stylesheet" href="theds.css">
	<style>
		.note {
			min-height: 1.5rem;
			outline: 1px dotted #CCC;
		}
	</style>
</head>
<body>
	<main class="ds-space">
		<h1>A simple note taking app</h1>
		<p class="note"></p>
	</main>
	<script type="module">
		import Note from './app.js'

		const note = new Note({
			editable: document.querySelector('.note')
		})
		note.editor.focus()
	</script>
</body>
</html>
